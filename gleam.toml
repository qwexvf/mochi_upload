name = "mochi_upload"
version = "0.1.0"
description = "File upload support for mochi GraphQL"
licences = ["Apache-2.0"]
repository = { type = "github", user = "qwexvf", repo = "mochi_upload" }
gleam = ">= 1.5.0"

[dependencies]
gleam_stdlib = ">= 1.0.0 and < 2.0.0"
gleam_json = ">= 3.0.0 and < 4.0.0"
simplifile = ">= 2.0.0 and < 3.0.0"
mochi = { git = "https://github.com/qwexvf/mochi.git", ref = "api-tighten" }

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"