name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        otp-version: ["27.3", "28.3"]
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp-version }}
          gleam-version: "1.15.4"
          rebar3-version: "3"
      - run: gleam deps download
      - run: gleam format --check src test
      - run: gleam build
      - run: gleam test
      - name: Check for warnings
        run: gleam check 2>&1 | tee check_output.txt && ! grep -q "warning:" check_output.txt
